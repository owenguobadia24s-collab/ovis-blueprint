  module_id: ^MOD-(?:[A-Z0-9]+-)*[A-Z0-9]+-\d{4}$
  repo_id: ^REPO-(?:[A-Z0-9]+-)*[A-Z0-9]+-\d{4}$
containment_fields:
  primary_module_field: module_id
  related_module_field: related_module_ids
